<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>想像と体験に関する研究 - Q12</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/system.css">
    <style>
        .rating-btn {
            width: 100px;
            margin: 0 10px;
        }
    </style>
</head>

<body>
    <div class="container mt-5 text-center">
        <div class="content_area my-5 p-4 border rounded bg-light no-select">
            <h2>実験の中で目を閉じるように指示された際に、実際に目を閉じましたか？</h2>
        </div>

        <div class="form_area d-flex flex-column align-items-center">
            <form action="3_after01.html" method="GET" id="form" novalidate>

                <div class="p-3 border rounded bg-white mb-4">
                    <div class="rating-buttons d-flex justify-content-center align-items-center">
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="いいえ">いいえ</button>
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="はい">はい</button>
                    </div>
                    <input type="hidden" name="q12" id="answer" required>
                </div>

                <div class="custom_paragraph_area">
                    <button type="submit" class="btn btn-primary btn-lg px-5">次へ</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/system.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/relay.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. system.jsの関数でボタン選択と値のセットを有効化
            handleRatingButtonClick('form', '.rating-btn', 'answer');

            // 2. システム共通キーボードショートカットを有効化
            document.addEventListener('keydown', function(event) {
                if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
                handleYesNoKeydown(event, '.rating-btn', 'answer');
            });

            // 3. 送信イベントをフックし、sessionStorageへ隠蔽保存して遷移
            document.getElementById('form').addEventListener('submit', function(event) {
                event.preventDefault(); // GET送信（URL露出）をストップ

                const hiddenInput = document.getElementById('answer');

                // バリデーション実行
                if (hiddenInput.value === '') {
                    clearFormErrors();
                    displayFormError(hiddenInput, "「はい」または「いいえ」を選択してください。", hiddenInput.parentNode);
                    return;
                }

                // --- 安全にセッションストレージへ格納 ---
                sessionStorage.setItem('q12', hiddenInput.value);

                // パラメータなしで次の質問へ安全に遷移
                window.location.href = "3_after01.html";
            });
        });
    </script>
</body>

</html>
