<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>想像と体験に関する研究 - 同意説明</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <style>
    .no-select { user-select: none; }
    .custom_button { min-width: 150px; }
  </style>
</head>
<body>
<div class="container mt-5">
  <div class="content_area d-flex flex-column align-items-center no-select">
    <h1>「想像と体験に関する研究」 の説明書</h1>
    <div class="border p-4 my-3 bg-light w-100" style="max-height: 400px; overflow-y: auto;">
      <p>【研究目的および方法】</p>
      <p>本研究は、音声によるガイダンスに従って様々な事象を想像した際における、主観的な体験の変容プロセスについて調査することを目的としています。</p>
      <p>実験の所要時間は約20分から30分程度です。途中でブラウザの「戻る」ボタンや「更新（リロード）」を行うと実験が正常に終了できなくなりますのでご注意ください。</p>
    </div>
  </div>

  <div class="form_area mt-4 d-flex flex-column align-items-center">
    <form action="0_pre02_user_information.html" method="GET" id="form" novalidate>
      <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="consentCheck" required>
        <label class="form-check-label" for="consentCheck">上記の説明について理解し、自らの意思で研究への参加に同意します。</label>
      </div>
      <button type="submit" class="btn btn-primary btn-lg custom_button">次へ</button>
    </form>
  </div>
</div>

<script src="js/jquery-3.7.1.min.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/relay.js"></script>
<script>
  document.getElementById('form').addEventListener('submit', function(event){
    validateRequiredFields(event, "研究に参加するには同意チェックが必要です。");
  });
</script>
</body>
</html>
