            <h2>次に、「あなたは全てを思い出すことができます」と言われるまで、実験中に行ったことは何も思い出せないと言われました。</h2>
            <p class="text-muted mt-2">「あなたは全てを思い出すことができます」と言われるまで、どの程度、この出来事を思い出すことが難しかったですか？0から5までの尺度でお答えください。0は普段と同じように簡単に思い出すことができたことを意味し、5はまるで記憶に空白があるかのように、思い出すのが非常に困難だったことを意味します。</p>

                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="1">1</button>
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="2">2</button>
