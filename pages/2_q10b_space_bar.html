<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>想像と体験に関する研究 - Q10b</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/system.css">
    <style>
        .rating-btn {
            width: 50px;
            margin: 0 5px;
        }
    </style>
</head>

<body>
    <div class="container mt-5 text-center">
        <div class="content_area my-4 p-4 border rounded bg-light text-start no-select lh-base">
            <h2>あなたはスペースバーを6回連続で押すように言われましたが、そうするように言われたことを忘れてしまうように言われました。</h2>
            <p class="text-muted mt-2">スペースバーを6回押すように指示されたことを、どの程度はっきりと覚えているかを0から5までの尺度で答えてください。0はその指示を普通に覚えていたこと、5はその指示を全く覚えていなかったことを意味します。あなたの体験に対応する数字を選択してください。</p>
        </div>

        <div class="form_area d-flex flex-column align-items-center">
            <form action="2_q11_moving_body.html" method="GET" id="form" novalidate>

                <div class="p-3 border rounded bg-white mb-4">
                    <h4 class="mb-3">あなたの体験に対応する数字を選択してください</h4>
                    <div class="rating-buttons d-flex justify-content-center align-items-center">
                        <span class="me-3 no-select">指示を普通に覚えていた</span>
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="0">0</button>
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="1">1</button>
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="2">2</button>
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="3">3</button>
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="4">4</button>
                        <button type="button" class="btn btn-outline-primary rating-btn" data-value="5">5</button>
                        <span class="ms-3 no-select">指示を覚えていなかった</span>
                    </div>
                    <input type="hidden" name="q10b" id="answer" required>
                </div>

                <div class="custom_paragraph_area">
                    <button type="submit" class="btn btn-primary btn-lg px-5">次へ</button>
                </div>

            </form>
        </div>
    </div>

    <script src="../js/system.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/relay.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. system.jsの関数を使って、ボタン選択（.selectedクラス追加とhiddenへの値セット）を有効化
            handleRatingButtonClick('form', '.rating-btn', 'answer');

            // 2. 数字キー（0〜5）によるショートカットをシステム共通仕様に合わせて適用したい場合
            document.addEventListener('keydown', function(event) {
                if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
                handleRatingKeydown(event, '.rating-btn', 'answer');
            });

            // 3. 送信処理の乗っ取り（GET送信の隠蔽化）
            document.getElementById('form').addEventListener('submit', function(event) {
                event.preventDefault(); // デフォルトのGET送信を強制ストップ

                const hiddenInput = document.getElementById('answer');

                // 必須チェック（未選択を弾く）
                if (hiddenInput.value === '') {
                    clearFormErrors();
                    displayFormError(hiddenInput, "0から5のいずれかの数字を選択してください。", hiddenInput.parentNode);
                    return;
                }

                // --- セキュリティ改善：尺度回答の値をセッションストレージに保存 ---
                sessionStorage.setItem('q10b', hiddenInput.value);

                // 次の尺度質問ページへ安全に遷移
                window.location.href = "2_q11_moving_body.html";
            });
        });
    </script>
</body>

</html>
