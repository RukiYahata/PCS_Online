<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>想像と体験に関する研究 - 音声8</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
</head>

<body>
    <div class="container mt-5 text-center">
        <div class="content_area my-5 p-4 border rounded bg-light no-select">
            <h2>音声が再生中です</h2>
            <p class="text-muted">（音声を注意充実に聞いて、指示にしたがってください）</p>
            <audio id="audio_element" preload="auto">
      <source src="../audio/8_recollection.mp3" type="audio/mp3">
    </audio>
        </div>

        <div class="form_area d-flex flex-column align-items-center">
            <form action="1_exp11_answering_experience2.html" method="GET" id="form" novalidate>
                <button type="submit" id="skip_button" class="btn btn-secondary btn-lg">SKIP</button>
            </form>
            <button id="replay_button" class="btn btn-primary btn-lg mt-3" style="display:none;">音声を再生</button>
        </div>
    </div>

    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/relay.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var audioElement = document.getElementById('audio_element');
            var replayButton = document.getElementById('replay_button');
            var form = document.getElementById('form');

            audioElement.play().catch(function() {
                replayButton.style.display = 'block';
            });
            replayButton.addEventListener('click', function() {
                audioElement.play();
            });
            audioElement.addEventListener('ended', function() {
                form.submit();
            });
        });
    </script>
</body>

</html>
