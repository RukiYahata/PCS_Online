<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>想像と体験に関する研究 - 開始</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <style>
        .no-select {
            user-select: none;
        }
        
        .custom_button {
            min-width: 150px;
        }
        
        .custom_paragraph_area {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container xml-container mt-5">
        <div class="content_area d-flex flex-column align-items-center">
            <h1 class="no-select no-right-click">「想像と体験に関する研究」</h1>
        </div>
        <div class="form_area mt-4 d-flex flex-column align-items-center">
            <form action="0_pre01_consent_check.html" method="GET" id="form" novalidate>

                <div class="custom_paragraph_area">
                    <h2 class="no-select no-right-click">プロジェクトID</h2>
                    <input type="text" class="no-spin form-control text-center" id="id" name="id" required>
                </div>

                <input type="hidden" id="startTime" name="startTime" value="">

                <div class="custom_paragraph_area">
                    <button type="submit" class="btn btn-primary btn-lg custom_button">開始する</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/relay.js"></script>
    <script>
        document.getElementById('form').addEventListener('submit', function(event) {
            if (!validateRequiredFields(event, "プロジェクトIDは必須です。")) return;
            // 送信直前の時間を実験開始時間として記録
            document.getElementById('startTime').value = getFormattedFormattedTime();
        });
    </script>
</body>

</html>
