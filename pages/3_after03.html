<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>想像と体験に関する研究 - 実験の終了</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/system.css">
</head>

<body>
    <div class="container mt-5 text-center">
        <div class="content_area my-5 no-select">
            <h1>実験の終了</h1>
            <div class="my-4 p-4 border rounded bg-light text-start lh-base">
                <p>この度は、ご協力いただきありがとうございました。下記ボタンを押下し、実験内容をサーバーに送信してください。データ送信をもって実験が完了となります。なおデータ送信後、自動でトップページに戻ります。</p>
            </div>
        </div>

        <div id="status_area" class="my-3"></div>

        <div class="form_area">
            <form id="final_form">
                <button type="submit" id="submit_btn" class="btn btn-primary btn-lg px-5">データを送信する</button>
            </form>
        </div>
    </div>

    <script src="../js/system.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/relay.js"></script>
    <script>
        document.getElementById('final_form').addEventListener('submit', function(event) {
            event.preventDefault(); // 通常の送信を抑止
            disableSubmitButton();

            const submitBtn = document.getElementById('submit_btn');
            const statusArea = document.getElementById('status_area');

            // ボタンの二重押し防止
            submitBtn.disabled = true;
            statusArea.innerHTML = '<div class="alert alert-info">データを送信中です。そのままお待ちください...</div>';

            // 1. セッションストレージから全ての蓄積データをオブジェクト化
            const payload = {
                id: sessionStorage.getItem('id') || "",
                startTime: sessionStorage.getItem('startTime') || "",
                user: sessionStorage.getItem('user') || "",
                age: sessionStorage.getItem('age') || "",
                gender: sessionStorage.getItem('gender') || "",
                ballColor: sessionStorage.getItem('ballColor') || "",
                memory1: sessionStorage.getItem('memory1') || "",
                memory2: sessionStorage.getItem('memory2') || "",
                q1: sessionStorage.getItem('q1') || "",
                q2: sessionStorage.getItem('q2') || "",
                q3: sessionStorage.getItem('q3') || "",
                q4a: sessionStorage.getItem('q4a') || "",
                q4b: sessionStorage.getItem('q4b') || "",
                q5: sessionStorage.getItem('q5') || "",
                q6: sessionStorage.getItem('q6') || "",
                q7: sessionStorage.getItem('q7') || "",
                q8: sessionStorage.getItem('q8') || "",
                q9: sessionStorage.getItem('q9') || "",
                q10a: sessionStorage.getItem('q10a') || "",
                q10b: sessionStorage.getItem('q10b') || "",
                q11: sessionStorage.getItem('q11') || "",
                q12: sessionStorage.getItem('q12') || ""
            };

            // 2. 実験の終了時間 (endTime) を記録
            const endTimeStr = getFormattedFormattedTime();
            payload['endTime'] = endTimeStr;

            // 3. 実験所要時間 (duration) を自動計算
            if (payload['startTime']) {
                // "yyyy-mm-dd hh:mm:ss" 形式から Date オブジェクトが作れない端末用セーフティパース
                const startStr = payload['startTime'].indexOf('-') !== -1 ? payload['startTime'].replace(/-/g, '/') : payload['startTime'];
                const endStr = endTimeStr.replace(/-/g, '/');

                const start = new Date(startStr);
                const end = new Date(endStr);
                const diffMs = end - start;

                if (!isNaN(diffMs)) {
                    const diffHrs = Math.floor(diffMs / 3600000);
                    const diffMins = Math.floor((diffMs % 3600000) / 60000);
                    const diffSecs = Math.floor((diffMs % 60000) / 1000);
                    payload['duration'] = `${diffHrs}:${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;
                } else {
                    payload['duration'] = "0:00:00";
                }
            } else {
                payload['duration'] = "0:00:00";
            }

            const GAS_URL = 'https://script.google.com/macros/s/AKfycbzvxpXeEzSPA0AvMM7lTwbh0AxnKGTRg_sOjxeqlak02gU1VQCMcBHns_RSPhGdkE6ApQ/exec';

            // 4. GASへ非同期でPOST一括送信
            fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'cors',
                    redirect: 'manual', // ★超重要: GASのCORSリダイレクトによるブラウザの誤エラー判定を回避
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => {
                    // redirect: 'manual' の場合、正常に送信されてリダイレクトが発生すると 
                    // response.type が "opaqueredirect" になる、または status が 0 (あるいは 302) になります。
                    // スプレッドシートへの書き込みが成功している＝このリダイレクトまで到達しているという意味なので、
                    // これらを「送信成功」として安全にハンドリングします。
                    if (response.ok || response.type === 'opaqueredirect' || response.status === 0) {
                        return {
                            result: "success"
                        };
                    }
                    throw new Error('サーバー側でエラーレスポンスが返されました。 Status: ' + response.status);
                })
                .then((result) => {
                    if (result.result === "success") {
                        statusArea.innerHTML = '<div class="alert alert-success">データが正常に保存されました。ご協力ありがとうございました。</div>';

                        // 実験が完全に完了したため、個人のセッションデータを安全に抹消
                        sessionStorage.clear();

                        setTimeout(function() {
                            window.location.href = '../index.html';
                        }, 4000);
                    } else {
                        throw new Error(result.message || 'GAS内部エラー');
                    }
                })
                .catch((error) => {
                    submitBtn.disabled = false;
                    statusArea.innerHTML = `<div class="alert alert-danger">送信エラーが発生しました。データが保存されていない可能性があります。再試行してください。<br><small>${error.message}</small></div>`;
                    console.error(error);
                });
        });
    </script>
</body>

</html>
