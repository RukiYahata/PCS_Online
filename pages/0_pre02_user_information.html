<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>想像と体験に関する研究 - 属性入力</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/system.css">
    <style>
        .custom_paragraph_area {
            margin-bottom: 25px;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body>
    <div class="container mt-5 d-flex flex-column align-items-center">
        <div class="content_area text-center mb-4">
            <h1>以下の質問にお答えください</h1>
        </div>
        <div class="form_area w-100 d-flex flex-column align-items-center">
            <form action="0_pre03_headphone_confirmination.html" method="GET" id="form" novalidate class="w-100 d-flex flex-column align-items-center">

                <div class="custom_paragraph_area">
                    <label for="user" class="form-label h5">ユーザーIDを教えて下さい</label>
                    <input type="text" class="form-control text-center" id="user" name="user" required>
                </div>

                <div class="custom_paragraph_area">
                    <label for="age" class="form-label h5">あなたの年齢を教えて下さい</label>
                    <input type="number" class="form-control text-center" id="age" name="age" required min="0" max="120">
                </div>

                <div class="custom_paragraph_area text-center">
                    <span class="form-label h5 d-block mb-2">あなたの性別を教えて下さい</span>
                    <div class="form-check form-check-inline">
                        <input type="radio" id="female" name="gender" value="女性" class="form-check-input" required>
                        <label for="female" class="form-check-label">女性</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input type="radio" id="male" name="gender" value="男性" class="form-check-input" required>
                        <label for="male" class="form-check-label">男性</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input type="radio" id="other" name="gender" value="それ以外" class="form-check-input" required>
                        <label for="other" class="form-check-label">それ以外</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input type="radio" id="noanswer" name="gender" value="回答しない" class="form-check-input" required>
                        <label for="noanswer" class="form-check-label">回答しない</label>
                    </div>
                </div>

                <div class="custom_paragraph_area text-center mt-3">
                    <button type="submit" class="btn btn-primary btn-lg w-50">次へ</button>
                </div>

            </form>
        </div>
    </div>

    <script src="../js/system.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/relay.js"></script>
    <script>
        document.getElementById('form').addEventListener('submit', function(event) {
            validateRequiredFields(event, "すべての項目に入力・選択をしてください。");
        });
    </script>
</body>

</html>
