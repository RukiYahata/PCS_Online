<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>想像と体験に関する研究 - 記述2</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/system.css">
</head>

<body>
    <div class="container mt-5 text-center">
        <div class="content_area my-4 p-4 border rounded bg-light no-select">
            <p class="fs-5 text-start lh-base">この実験をはじめてから今までに起こったことを簡単に書き出してください。細部まで書く必要はありません。2分間で書き終えてください。時間がきたら自動的に次に進みます。</p>
        </div>

        <div class="form_area w-100 d-flex flex-column align-items-center">
            <form action="2_q00_introduction.html" method="GET" id="form" novalidate class="w-100">
                <div class="mb-4 d-flex justify-content-center">
                    <textarea id="comments" name="memory2" rows="6" class="form-control w-70" required></textarea>
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-primary btn-lg px-5">次へ</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/system.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/relay.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var form = document.getElementById('form');
            var textarea = document.getElementById('comments');

            // データをストレージに保存して安全に画面遷移させる共通処理
            function saveAndNavigate() {
                // 自動遷移時のために、空欄だった場合は空文字をセット
                sessionStorage.setItem('memory2', textarea.value);
                window.location.href = "2_q00_introduction.html";
            }

            // 1. 2分（120000ms）が来たら無条件で安全に自動遷移
            setTimeout(function() {
                saveAndNavigate();
            }, 120000);

            // 2. ユーザーが手動で「次へ」を押したときのバリデーションと保存
            form.addEventListener('submit', function(event) {
                event.preventDefault(); // デフォルトのGET送信を強制ストップ

                if (!textarea.value.trim()) {
                    clearFormErrors();
                    displayFormError(textarea, "内容を入力してください。", textarea.parentNode);
                    return;
                }

                saveAndNavigate();
            });
        });
    </script>
</body>

</html>
