<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>想像と体験に関する研究 - ボール色入力</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/system.css">
</head>

<body>
    <div class="container mt-5 text-center">
        <div class="content_area my-5 p-4 border rounded bg-light">
            <h2>ボールの色を入力してください。</h2>
            <p>ボールの色を入力し終えたら、「完了」を押してください。</p>
            <audio id="audio_element" preload="auto">
      <source src="../audio/6_vision_input.mp3" type="audio/mp3">
    </audio>
        </div>

        <div class="form_area d-flex flex-column align-items-center">
            <form action="1_exp07_audio_7.html" method="GET" id="form" novalidate>
                <div class="custom_paragraph_area">
                    <input type="text" id="ball_color" name="ballColor" class="form-control text-center" required>
                </div>
                <div class="custom_paragraph_area">
                    <button type="submit" class="btn btn-primary btn-lg custom-button">完了</button>
                </div>
            </form>
            <button id="replay_button" class="btn btn-primary btn-lg custom-button" style="display:none;">音声を再生</button>
        </div>
    </div>

    <script src="../js/system.js"></script>
    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/relay.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var audioElement = document.getElementById('audio_element');
            var replayButton = document.getElementById('replay_button');
            var form = document.getElementById('form');
            var inputField = document.getElementById('ball_color');

            // 音声の自動再生処理（既存の優れたエラーハンドリングを維持）
            audioElement.play().catch(function() {
                replayButton.style.display = 'block';
            });

            replayButton.addEventListener('click', function() {
                audioElement.play();
            });

            // 送信イベントをフックし、URLではなくメモリ（sessionStorage）へ保存
            form.addEventListener('submit', function(event) {
                event.preventDefault(); // デフォルトのGET送信（URLへのデータ露出）をストップ

                // 必須入力チェック（空白のみの入力もトリミングして弾く）
                if (!inputField.value.trim()) {
                    clearFormErrors();
                    displayFormError(inputField, "ボールの色を入力してください。", inputField.parentNode);
                    return;
                }

                // --- セキュリティ改善：安全にセッションストレージへ格納 ---
                sessionStorage.setItem('ballColor', inputField.value.trim());

                // パラメーターを付与せず、クリーンなURLのまま次の音声ページへ遷移
                window.location.href = "1_exp07_audio_7.html";
            });
        });
    </script>
</body>

</html>
