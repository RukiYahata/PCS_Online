<!DOCTYPE html>
<html lang="ja" class="h-100">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>「想像と体験に関する研究」のアンケート</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
    .no-select {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    .no-right-click {
      pointer-events: none;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
    }

    h1 {
      font-weight: bold;
      font-size: 24px;
      text-align: center;
    }

    h2 {
      font-weight: bold;
      font-size: 16px;
    }

    p {
      font-size: 14px;
    }

    .content_area {
      margin-top: 100px;
    }

    .form_area {
      padding-top: 70px;
      padding-bottom: 100px;
      text-align: center; 
      /*border-top: 1px solid #dddddd;*/
      
    }

    .custom_text_attention {
      color: red;
    }

    .custom_text_error_message {
      text-align: center;
    }

    .custom_paragraph_area {
      margin-top: 50px;
    }

    .custom_max_width {
      max-width: 600px;
    }

    .custom_checkbox {
        margin-right: 10px;
        width: 1.5rem;
        height: 1.5rem;
        background-color: #dddddd;
    }

    .custom_button {
      margin-top: 30px;
    }

    .form_error_message {
        font-size: small;
        color: red;
        margin-top: 5px;
    }

    .custom_radio_button {
      background-color: #dddddd;
    }

    .custom_radio_label {
      margin-right: 20px
    }


    .rating-buttons button {
      margin: 0 5px;
      padding: 10px 20px;
      border: 1px solid #ccc;
      background-color: #f8f9fa;
      cursor: pointer;
      transition: background-color 0.3s, border-color 0.3s;
    }

    .rating-buttons button.selected {
      background-color: #007bff;
      border-color: #007bff;
      color: white;
    }

    .rating-buttons button:hover {
      background-color: #0056b3;
      border-color: #0056b3;
      color: white;
    }

    .rating-buttons span {
      font-size: small;
    }

    .checkbox_list_area{
      width: 200px;
      text-align: left;
    }

    .checkbox_center_area{
      text-align: center;
    }

    #replay_button{
      margin-top: 30px;
    }

    .no-spin::-webkit-inner-spin-button,
    .no-spin::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
        -moz-appearance:textfield;
    }
    </style>   
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        if (typeof disableBrowserBackButton === 'function') {
            disableBrowserBackButton("戻るボタンは無効です。");
        }
      });
    </script>
</head>
<body class="h-100">
    <div class="container h-100 d-flex flex-column justify-content-start main-content">
      <div class="row w-100 justify-content-center">
        <div class="col-lg-6 col-md-10 col-sm-12">
