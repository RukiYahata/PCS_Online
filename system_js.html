    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
    const PAGE_TABLE = [
        "index",
        // "0_pre01_consent_check",
        // "0_pre02_user_information",
        // "0_pre03_headphone_confirmination",
        // "0_pre04_audio_annoucement",
        // "1_exp01_audio_1",
        // "1_exp02_audio_2",
        // "1_exp03_audio_3",
        // "1_exp04_audio_4_ball",
        // "1_exp05_audio_5",
        // "1_exp06_audio_6_answering_ball_color",
        // "1_exp07_audio_7",
        // "1_exp08_waiting",
        // "1_exp09_answering_experience1",
        // "1_exp10_audio_8",
        // "1_exp11_answering_experience2",
        // "2_q00_introduction",
        // "2_q01_weight_of_hand",
        // "2_q02_force_pulling_both_hands",
        // "2_q03_buzzing_of_mosquito",
        // "2_q04a_sweet_taste",
        // "2_q04b_sour_taste",
        // "2_q05_stiffness_of_right_arm",
        // "2_q06_weight_of_left_hand_and_arm",
        // "2_q07_music",
        // "2_q08_color_ball",
        // "2_q09_memory",
        // "2_q10a_space_bar",
        // "2_q10b_space_bar",
        // "2_q11_moving_body",
        // "2_q12_closing_eyes",
        // "3_after01",
        // "3_after03" // 最終ページ（このページで送信処理が走ります）
    ];

    // フォーム送信時のチェック関数
    function validateForm(event) {
        const form = event.target;
        
        // 1. 同意書ページのチェック
        const consentCheckbox = document.getElementById('consent');
        if (consentCheckbox && !consentCheckbox.checked) {
            alert("同意してください。");
            return false;
        }

        // 2. 評価尺度（Q1-Q12など）のバリデーション
        const hiddenInput = document.getElementById('answer');
        if (hiddenInput && hiddenInput.value === "") {
            alert("選択してください。");
            return false;
        }

        // 3. テキスト入力のバリデーション
        const textField = form.querySelector('input[type="text"][required], textarea[required]');
        if (textField && textField.value.trim() === "") {
            alert("この項目は必須です。該当する内容がない場合は「なし」と入力してください。");
            return false;
        }
        return true;
    }

    // 日付フォーマット関数
    function formatDateTime(date) {
        var pad = function(n) { return n < 10 ? '0' + n : n; };
        return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate()) + ' ' +
               pad(date.getHours()) + ':' + pad(date.getMinutes()) + ':' + pad(date.getSeconds());
    }

    // フォームデータ送信・遷移処理
    document.addEventListener('DOMContentLoaded', function() {
        var form = document.getElementById('form');
        if (form) {
            form.addEventListener('submit', function(event) {
              if (!validateForm(event)) {
                    event.preventDefault(); // 送信を停止
                    // 遷移前に無効化してしまったボタンを戻す必要がある場合はここで行う
                    var submitButton = form.querySelector('button[type="submit"]');
                    if(submitButton) submitButton.disabled = false;
                    return;
                }

                // バリデーション成功時はデフォルトの送信（遷移）を許可
                // ただし、遷移ロジックをJSで制御したいので、ここも preventDefault ではなく制御する
                event.preventDefault();
                var formData = new FormData(form);
                for (var [key, value] of formData.entries()) {
                    sessionStorage.setItem(key, value);
                }
                
                // バリデーションチェック
                const hiddenInput = document.getElementById('answer');
                const textField = document.querySelector('input[type="text"][required], textarea[required]');
                
                if ((hiddenInput && hiddenInput.value === "") || (textField && textField.value.trim() === "")) {
                    alert("選択または入力してください。");
                    return;
                }

                // セッション保存
                var formData = new FormData(form);
                for (var [key, value] of formData.entries()) {
                    sessionStorage.setItem(key, value);
                }

                // 開始時間の記録
                var currentPage = formData.get('source');
                if (currentPage === "0_pre00_index") {
                    sessionStorage.setItem("start_time_ms", new Date().getTime());
                }

                // 遷移ロジック
                var currentIndex = PAGE_TABLE.indexOf(currentPage);
                var nextPage = PAGE_TABLE[currentIndex + 1];

                if (nextPage === "3_after03") {
                    window.top.location.href = APP_URL + "?page=3_after03&id=" + sessionStorage.getItem("id");
                } else if (nextPage) {
                    window.top.location.href = APP_URL + "?page=" + nextPage + "&id=" + sessionStorage.getItem("id");
                } else {
                    submitFinalData();
                }
            });
        }
    });

    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyg6h00KWhgjIUlkNCnexPAcZvwBmLpRbLjLZ_b4sFD64gl60qk9VYc8NfFqSgwz7Eb2g/exec";

    // 1次元配列作成とGASへの送信
    function submitFinalData() {
        var endTime = new Date();
        var startTime = new Date(parseInt(sessionStorage.getItem("start_time_ms"), 10));
        
        var durationSec = Math.floor((endTime - startTime) / 1000);
        var duration = Math.floor(durationSec / 3600) + ':' + String(Math.floor((durationSec % 3600) / 60)).padStart(2, '0') + ':' + String(durationSec % 60).padStart(2, '0');

        var rowData = [
            sessionStorage.getItem("project_id") || "0",
            formatDateTime(startTime),
            formatDateTime(endTime),
            duration,
            sessionStorage.getItem("id") || "",
            sessionStorage.getItem("age") || "",
            sessionStorage.getItem("gender") || "",
            sessionStorage.getItem("ball_color") || "",
            sessionStorage.getItem("memory_1") || "",
            sessionStorage.getItem("memory_2") || "",
            sessionStorage.getItem("q1") || "",
            sessionStorage.getItem("q2") || "",
            sessionStorage.getItem("q3") || "",
            sessionStorage.getItem("q4a") || "",
            sessionStorage.getItem("q4b") || "",
            sessionStorage.getItem("q5") || "",
            sessionStorage.getItem("q6") || "",
            sessionStorage.getItem("q7") || "",
            sessionStorage.getItem("q8") || "",
            sessionStorage.getItem("q9") || "",
            sessionStorage.getItem("q10a") || "",
            sessionStorage.getItem("q10b") || "",
            sessionStorage.getItem("q11") || "",
            sessionStorage.getItem("q12") || ""
        ];

        fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors', // CORSエラー回避のため
          cache: 'no-cache',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(rowData)
        })
        .then(() => {
            alert("送信完了しました。");
            sessionStorage.clear();
            window.top.location.href = "index.html"; // GitHub上のトップへ
        })
        .catch(err => {
            console.error(err);
            alert("送信に失敗しました。");
        });
    }

    // ボタン選択の処理をより確実に
    function handleRatingButtonClick(formId, buttonClass, inputId) {
        const buttons = document.querySelectorAll(buttonClass);
        const hiddenInput = document.getElementById(inputId);

        buttons.forEach(button => {
            // CSSによるpointer-events: noneを解除するための明示的設定
            button.style.pointerEvents = "auto"; 
            
            button.addEventListener('click', function() {
                buttons.forEach(btn => btn.classList.remove('selected'));
                button.classList.add('selected');
                hiddenInput.value = button.getAttribute('data-value');
            });
        });
    }

    // はい/いいえ ボタン用の選択処理
    function handleYesNoKeydown(event, buttonClass, inputId) {
        // キーボード操作の対応ロジックなど
    }

    // フォーム送信時のチェック関数
    function validateRequiredFields(event, message) {
        const hiddenInput = document.getElementById('answer'); // 評価尺度用
        const textField = document.querySelector('input[type="text"][required], textarea[required]'); // テキスト用
        
        // 評価尺度（Q1-Q12など）のバリデーション
        if (hiddenInput && hiddenInput.value === "") {
            event.preventDefault();
            alert(message);
            return false;
        }
        // テキスト入力のバリデーション
        if (textField && textField.value.trim() === "") {
            event.preventDefault();
            alert("入力してください。");
            return false;
        }
        return true;
    }

    // 送信ボタンの無効化（二重送信防止）
    function disableSubmitButton() {
        var submitButton = document.querySelector('button[type="submit"]');
        if (submitButton) submitButton.disabled = true;
    }
</script>
