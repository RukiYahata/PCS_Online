<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>想像と体験に関する研究 - 開始</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <style>
    .no-select { user-select: none; }
    .custom_button { min-width: 150px; }
    .custom_paragraph_area { margin-bottom: 20px; }
  </style>
</head>
<body>
<div class="container xml-container mt-5">
  <div class="content_area d-flex flex-column align-items-center">
    <h1 class="no-select">「想像と体験に関する研究」</h1>
  </div>

  <div class="form_area mt-4 d-flex flex-column align-items-center">
    <form action="pages/0_pre01_consent_check.html" method="GET" id="form" novalidate>
      
      <div class="custom_paragraph_area text-center">
        <h2 class="no-select">プロジェクトID</h2>
        <input type="text" class="form-control text-center" id="id" name="id" required>
      </div>

      <input type="hidden" id="startTime" name="startTime" value="">

    </form>
    
    <div class="custom_paragraph_area text-center mt-3">
      <button type="button" id="submit_trigger_btn" class="btn btn-primary btn-lg custom_button">開始する</button>
    </div>
  </div>
</div>

<script src="js/jquery-3.7.1.min.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/relay.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const form = document.getElementById('form');
    const triggerBtn = document.getElementById('submit_trigger_btn');

    triggerBtn.addEventListener('click', function(event) {
      if(!validateRequiredFields({ target: form }, "プロジェクトIDは必須です。")) {
        return;
      }
      // 実験開始時間を記録
      document.getElementById('startTime').value = getFormattedFormattedTime();
      form.submit();
    });
  });
</script>
</body>
</html>
